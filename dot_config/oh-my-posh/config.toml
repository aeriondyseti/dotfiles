"$schema" = "https://raw.githubusercontent.com/JanDeDobbeleer/oh-my-posh/main/themes/schema.json"
version = 2
final_space = true
console_title_template = "{{ if .Root }}# {{ end }}{{ .Folder }}{{ if .Segments.Git.HEAD }} ({{ .Segments.Git.HEAD }}){{ end }}"
patch_pwsh_bleed = true

[[blocks]]
type = "prompt"
alignment = "left"
newline = true

  [[blocks.segments]]
  type = "os"
  style = "powerline"
  foreground = "p:grey-bright"
  background = "p:teal"
  template = " {{ .Icon }} "
  powerline_symbol = "¯é╝"
  leading_diamond = ""

    [blocks.segments.options]
    linux = ""
    macos = ""
    ubuntu = ""
    windows = "¯£Å"

  [[blocks.segments]]
  type = "shell"
  style = "powerline"
  foreground = "p:grey-bright"
  background = "p:grey-mid"
  template = " {{ .Name }} "
  powerline_symbol = "¯é╝"
  leading_diamond = ""
  trailing_diamond = "¯é╝"

  [[blocks.segments]]
  type = "node"
  style = "powerline"
  foreground = "p:grey-dark"
  background = "p:node-green"
  template = " ¯£ÿ {{ .Major }}.{{ .Minor }}"
  powerline_symbol = "¯é╝"
  trailing_diamond = "¯é╝"

    [blocks.segments.options]
    fetch_package_manager = false

  [[blocks.segments]]
  type = "python"
  style = "powerline"
  foreground = "p:grey-dark"
  background = "p:python-gold"
  template = " ¯£╝ {{ .Major }}.{{ .Minor }}{{ if .Venv }} [{{ .Venv }}]{{ end }}"
  powerline_symbol = "¯é╝"
  trailing_diamond = "¯é╝"

  [[blocks.segments]]
  type = "kotlin"
  style = "powerline"
  foreground = "p:grey-dark"
  background = "p:kotlin-purple"
  template = " ¯áø {{ .Major }}.{{ .Minor }}"
  powerline_symbol = "¯é╝"
  trailing_diamond = "¯é╝"

  [[blocks.segments]]
  type = "bun"
  style = "powerline"
  foreground = "p:grey-dark"
  background = "p:bun-sand"
  template = " ¯Ø» {{ .Major }}.{{ .Minor }}"
  powerline_symbol = "¯é╝"
  trailing_diamond = "¯é╝"

  [[blocks.segments]]
  type = "dotnet"
  style = "powerline"
  powerline_symbol = "¯é╝"
  template = " ¯Öê {{ if .Unsupported }}´ü▒{{ else }}{{ .Full }}{{ end }} "
  foreground = "p:grey-dark"
  background = "p:dotnet-purple"

  [[blocks.segments]]
  type = "rust"
  style = "powerline"
  powerline_symbol = "¯é╝"
  template = " ¯×¿ {{ if .Error }}{{ .Error }}{{ else }}{{ .Full }}{{ end }}"
  foreground = "p:grey-dark"
  background = "p:rust-orange"

[[blocks]]
type = "prompt"
alignment = "right"
newline = false

  [[blocks.segments]]
  type = "spotify"
  style = "plain"
  foreground = "p:teal"
  template = '{{ if ne .Status "stopped" }}<p:amber>{{ .Icon }}</> {{ .Artist }} ÔÇö {{ .Track }}{{ end }}'
  powerline_symbol = "¯é╝"

[[blocks]]
type = "prompt"
alignment = "left"
newline = true

  [[blocks.segments]]
  type = "text"
  style = "plain"
  foreground = "p:grey-muted"
  template = "Ôò¡ÔöÇ"

  [[blocks.segments]]
  type = "path"
  style = "plain"
  foreground = "p:grey-light"

    [blocks.segments.options]
    folder_icon = ""
    folder_separator_icon = ""
    home_icon = "´Çò"
    max_depth = 3
    style = "agnoster_left"
    template = " {{ .Path }}"

[[blocks]]
type = "prompt"
alignment = "right"
newline = false

  [[blocks.segments]]
  type = "git"
  style = "plain"
  foreground = "p:git-blue"
  template = " ¯éá{{ .HEAD }}{{- if gt (add .Staging.Added .Staging.Modified .Staging.Deleted) 0 }} <p:teal-glow>Ô£ô{{ add .Staging.Added .Staging.Modified .Staging.Deleted }}</>{{ end }}{{- if gt (add .Working.Added .Working.Modified .Working.Deleted .Working.Untracked) 0 }} <p:amber>~{{ add .Working.Added .Working.Modified .Working.Deleted .Working.Untracked }}</>{{ end }}{{- if gt .Ahead 0 }} <p:teal-glow>Ôçí{{ .Ahead }}</>{{ end }}{{- if gt .Behind 0 }} <p:red>Ôçú{{ .Behind }}</>{{ end }}{{- if .Rebase }} <p:red>[rebasing]</>{{ end }}{{- if .CherryPick }} <p:red>[cherry-pick]</>{{ end }}{{- if .Merge }} <p:red>[merging]</>{{ end }}{{ if gt .StashCount 0 }} <p:grey-muted> {{ .StashCount }}</>{{ end }} "
  powerline_symbol = ""

    [blocks.segments.options]
    branch_icon = ""
    fetch_status = true
    fetch_upstream_icon = true

[[blocks]]
type = "prompt"
alignment = "left"
newline = true

  [[blocks.segments]]
  type = "text"
  style = "plain"
  foreground = "p:grey-muted"
  template = "Ôò░ÔöÇ"

  [[blocks.segments]]
  type = "session"
  style = "plain"
  foreground = "p:teal-glow"
  template = " <b>{{ .UserName }}<p:teal-mid>@{{ .HostName }}</></b>"

  [[blocks.segments]]
  type = "text"
  style = "plain"
  foreground = "p:teal-glow"
  foreground_templates = [ "{{ if gt .Code 0 }}p:red{{ end }}" ]
  template = " ÔØ»"

[transient_prompt]
template = "ÔØ» "
foreground = "p:teal-glow"
background = "transparent"
foreground_templates = [ "{{ if gt .Code 0 }}p:red{{ end }}" ]

[secondary_prompt]
template = "ÔÇª "
foreground = "p:grey-muted"
background = "transparent"

[palette]
teal = "#00474f"
teal-mid = "#006b6b"
teal-glow = "#00b3a0"
amber = "#f0a500"
amber-dim = "#8a6000"
red = "#d94444"
git-blue = "#4e94b8"
git-blue-dim = "#3a6f8a"
node-green = "#5b9a4b"
python-gold = "#c49a3c"
kotlin-purple = "#8b6bbf"
php-indigo = "#6181b6"
rust-orange = "#c4602c"
dotnet-purple = "#7868c0"
bun-sand = "#d6c39a"
black = "#0d0f12"
grey-dark = "#1a1a1a"
grey-mid = "#2a2a2a"
grey-border = "#3a3a3a"
grey-muted = "#666666"
grey-text = "#999999"
grey-light = "#c0c0c0"
grey-bright = "#e0e0e0"
white = "#ffffff"

[upgrade]
source = "cdn"
interval = "168h"
auto = false
notice = false
